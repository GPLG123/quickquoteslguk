<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimum Charge</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 0;
}

.container {
    max-width: 900px;
    margin: 50px auto;
    background: #ffffff;
    padding: 40px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    border-radius: 8px;
}

h1 {
    text-align: center;
    color: #333;
}

h2 {
    margin-top: 40px;
    color: #4CAF50;
}

.price-box {
    background: #f9f9f9;
    padding: 20px;
    border-radius: 6px;
    margin-top: 20px;
}

ul {
    list-style: none;
    padding: 0;
}

ul li {
    padding: 10px 0;
    border-bottom: 1px solid #ddd;
    font-size: 16px;
}

ul li:last-child {
    border-bottom: none;
}

.highlight {
    font-size: 20px;
    font-weight: bold;
    color: #000;
}
</style>
</head>

<body>

<div class="container">
    <h1>Minimum Charge</h1>

    <div class="price-box">
        <h2>Up to 10 Miles</h2>
        <p class="highlight">£50 – All Vehicle Sizes</p>
    </div>

    <div class="price-box">
        <h2>More Than 10 Miles</h2>
        <ul>
            <li>SWB – £65</li>
            <li>MWB – £65</li>
            <li>LWB – £65</li>
            <li>XLWB – £65</li>
            <li>Luton – £65</li>
            <li>7.5T – £135</li>
            <li>18T – £145</li>
            <li>Arctic – £165</li>
        </ul>
    </div>
</div>

</body>
</html>
